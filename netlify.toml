# Static SPA deploy for Netlify.
# Netlify builds from index.html + src/netlify-client.tsx so deep links can
# fall back to the browser router instead of looking for a server entry.

[build]
  command = "npm run build:netlify"
  publish = "dist/client"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"